<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Nuclear fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        var _fetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: function() { return _fetch; },
            set: function(v) { _fetch = v; },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not redefine fetch on window, trying prototype...");
          try {
            var proto = Object.getPrototypeOf(window);
            Object.defineProperty(proto, 'fetch', {
              get: function() { return _fetch; },
              set: function(v) { _fetch = v; },
              configurable: true,
              enumerable: true
            });
          } catch (e2) {
            console.error("Critical: Failed to fix fetch property.");
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
