<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Nuclear fix for "Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          var _fetch = window.fetch;
          if (!_fetch) return;
          
          var defineFetch = function(obj) {
            Object.defineProperty(obj, 'fetch', {
              get: function() { return _fetch; },
              set: function(v) { _fetch = v; },
              configurable: true,
              enumerable: true
            });
          };

          try {
            defineFetch(window);
          } catch (e) {
            console.warn("Could not redefine fetch on window, trying prototype...");
            try {
              defineFetch(Object.getPrototypeOf(window));
            } catch (e2) {
              console.error("Critical: Failed to fix fetch property.");
            }
          }
        } catch (globalError) {
          console.error("Fetch fix global error:", globalError);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
